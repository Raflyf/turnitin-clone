<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Plagiasi No-Repository</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 900px;
        }
        .top-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }
        .upload-area {
            background-color: #f4f5f7;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background-color: #ebedf0;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
        }
        .btn-blue {
            background-color: #3b82f6;
        }
        .btn-red {
            background-color: #ef4444;
        }
        .upload-title {
            font-size: 20px;
            font-weight: 600;
            color: #555;
            margin: 15px 0 5px;
        }
        .upload-subtitle {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .upload-ext {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .filter-section {
            margin-bottom: 60px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }
        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #d1d5db;
        }
        
        .submit-container {
            display: flex;
            justify-content: center;
            margin-top: -20px;
        }
        .btn-submit {
            background-color: #fbcda7; /* Peach/Orange */
            color: white;
            border: none;
            padding: 12px 60px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .btn-submit.active {
            background-color: #f97316;
        }
        .btn-submit:hover.active {
            background-color: #ea580c;
        }
        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #9ca3af;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-submit.active .badge {
            background-color: #4b5563;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Frozen corpus detection banner */
        .frozen-banner {
            background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 30px;
            display: none;
            animation: slideDown 0.35s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .frozen-banner .frozen-title {
            font-size: 13px;
            font-weight: 700;
            color: #166534;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .frozen-banner .frozen-title svg {
            flex-shrink: 0;
        }
        .frozen-radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .frozen-radio-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid transparent;
            transition: all 0.2s;
        }
        .frozen-radio-group label:hover {
            background-color: #f0fdf4;
        }
        .frozen-radio-group label.selected {
            background-color: #fff;
            border-color: #22c55e;
            box-shadow: 0 1px 4px rgba(34,197,94,0.15);
        }
        .frozen-radio-group label.selected-orange {
            background-color: #fffbeb;
            border-color: #f97316;
            box-shadow: 0 1px 4px rgba(249,115,22,0.15);
        }
        .frozen-radio-group input[type="radio"] {
            accent-color: #22c55e;
            width: 16px;
            height: 16px;
        }
        .frozen-radio-group .radio-desc {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-title">CEK PLAGIASI NO-REPOSITORY</div>
    
    <div class="card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="dropZone">
            <div class="upload-buttons">
                <button class="btn btn-blue" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Unggah File
                </button>
                <button class="btn btn-red" onclick="event.stopPropagation(); resetFile()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Hapus Semua
                </button>
            </div>
            
            <h2 class="upload-title" id="fileText">Cek Plagiasi No-Repository</h2>
            <p class="upload-subtitle" id="fileSub">TARIK FILE MU KESINI / KLIK AJA DISINI</p>
            <p class="upload-ext" id="fileExt">Hanya menerima format .pdf</p>
            
            <input type="file" id="fileInput" accept=".pdf" onchange="fileSelected()">
        </div>
        
        <div class="filter-section">
            <div class="section-title">1. Pilih filter yang diinginkan</div>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="chkKutipan" checked> Kecualikan Kutipan
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="chkPustaka" checked> Kecualikan Daftar Pustaka
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="chkKecil"> Kecualikan sumber yang kurang dari 1%
                </label>
            </div>
        </div>

        <!-- Frozen corpus detection banner (hidden by default) -->
        <div class="frozen-banner" id="frozenBanner">
            <div class="frozen-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span id="frozenTitleText">Dokumen Dikenali</span>
            </div>
            <div class="frozen-radio-group">
                <label id="lblFrozen" class="selected" onclick="selectFrozenOption('frozen')">
                    <input type="radio" name="corpusChoice" value="frozen" checked>
                    <div>
                        <div>Gunakan Korpus Beku (Lebih Cepat)</div>
                        <div class="radio-desc" id="frozenDesc">Menggunakan data sumber yang sudah tersimpan.</div>
                    </div>
                </label>
                <label id="lblScrape" onclick="selectFrozenOption('scrape')">
                    <input type="radio" name="corpusChoice" value="scrape">
                    <div>
                        <div>Scrape Ulang dari Internet</div>
                        <div class="radio-desc">Mencari sumber baru dari internet (~15-25 menit). Korpus lama akan ditimpa.</div>
                    </div>
                </label>
            </div>
        </div>
        
        <div class="submit-container">
            <button class="btn-submit" id="submitBtn" onclick="uploadFile()">
                SUBMIT
                <div class="badge" id="fileCount">0</div>
            </button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
    <h3 style="color: #333; margin: 0;" id="loadingTitle">Memproses Dokumen...</h3>
    <p style="color: #666; font-size: 14px;" id="loadingSubtitle">Mesin sedang mencari kecocokan ke ratusan sumber web.</p>
    
    <div style="width: 80%; max-width: 400px; background-color: #e5e7eb; border-radius: 10px; margin-top: 20px; overflow: hidden; display: none;" id="progressContainer">
        <div id="progressBar" style="width: 0%; height: 20px; background-color: #f97316; transition: width 0.3s ease;"></div>
    </div>
    
    <div style="display: flex; justify-content: space-between; width: 80%; max-width: 400px; margin-top: 8px; display: none;" id="progressTextContainer">
        <span id="progressText" style="color: #666; font-size: 13px; font-weight: bold;">0%</span>
        <span id="timerText" style="color: #ef4444; font-size: 13px; font-weight: bold;">00:00</span>
    </div>
</div>

<script>
    let selectedFile = null;
    let frozenDetected = false;

    function selectFrozenOption(choice) {
        const lblFrozen = document.getElementById('lblFrozen');
        const lblScrape = document.getElementById('lblScrape');
        lblFrozen.classList.remove('selected');
        lblScrape.classList.remove('selected-orange');
        if (choice === 'frozen') {
            lblFrozen.classList.add('selected');
            lblFrozen.querySelector('input').checked = true;
        } else {
            lblScrape.classList.add('selected-orange');
            lblScrape.querySelector('input').checked = true;
        }
    }

    function fileSelected() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            document.getElementById('fileText').innerText = selectedFile.name;
            document.getElementById('fileSub').innerText = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('fileExt').innerText = 'Siap untuk diproses';
            
            const btn = document.getElementById('submitBtn');
            btn.classList.add('active');
            document.getElementById('fileCount').innerText = '1';

            // Check frozen corpus
            checkFrozenCorpus(selectedFile);
        }
    }

    function checkFrozenCorpus(file) {
        const banner = document.getElementById('frozenBanner');
        banner.style.display = 'none';
        frozenDetected = false;

        const formData = new FormData();
        formData.append('file', file);

        fetch('/check_frozen', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.exists) {
                    frozenDetected = true;
                    document.getElementById('frozenTitleText').innerText =
                        'Dokumen Dikenali (' + data.corpus_size + ' sumber tersimpan)';
                    document.getElementById('frozenDesc').innerText =
                        'Menggunakan ' + data.corpus_size + ' sumber yang sudah tersimpan. Estimasi proses (~3-6 menit).';
                    // Reset to frozen option
                    selectFrozenOption('frozen');
                    banner.style.display = 'block';
                }
            })
            .catch(() => { /* silent fail */ });
    }

    // Fitur Drag and Drop
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#e2e8f0';
        dropZone.style.border = '2px dashed #3b82f6';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#f4f5f7';
        dropZone.style.border = 'none';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#f4f5f7';
        dropZone.style.border = 'none';
        
        if (e.dataTransfer.files.length > 0) {
            document.getElementById('fileInput').files = e.dataTransfer.files;
            fileSelected();
        }
    });
    
    function resetFile() {
        selectedFile = null;
        frozenDetected = false;
        document.getElementById('fileInput').value = '';
        document.getElementById('fileText').innerText = 'Cek Plagiasi No-Repository';
        document.getElementById('fileSub').innerText = 'TARIK FILE MU KESINI / KLIK AJA DISINI';
        document.getElementById('fileExt').innerText = 'Hanya menerima format .pdf';
        document.getElementById('frozenBanner').style.display = 'none';
        
        const btn = document.getElementById('submitBtn');
        btn.classList.remove('active');
        document.getElementById('fileCount').innerText = '0';
    }

    let checkInterval;
    let timerInterval;

    function uploadFile() {
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('exclude_quotes', document.getElementById('chkKutipan').checked);
        formData.append('exclude_biblio', document.getElementById('chkPustaka').checked);
        formData.append('exclude_small', document.getElementById('chkKecil').checked);
        formData.append('use_semantic', 'true');

        let isScrape = true;
        if (frozenDetected) {
            const choice = document.querySelector('input[name="corpusChoice"]:checked');
            if (choice && choice.value === 'frozen') {
                isScrape = false;
            } else {
                formData.append('force_scrape', 'true');
            }
        }

        if (isScrape) {
            document.getElementById('loadingSubtitle').innerText =
                'Mencari sumber di internet lalu mencocokkan (~15-25 menit)...';
        } else {
            document.getElementById('loadingSubtitle').innerText =
                'Memproses dokumen dengan korpus beku (~3-6 menit)...';
        }

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('progressTextContainer').style.display = 'flex';
        
        let startTime = Date.now();
        document.getElementById('timerText').innerText = "00:00";
        timerInterval = setInterval(() => {
            let elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            let minutes = Math.floor(elapsedSeconds / 60);
            let seconds = elapsedSeconds % 60;
            let formattedTime = 
                (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                (seconds < 10 ? "0" + seconds : seconds);
            document.getElementById('timerText').innerText = formattedTime;
        }, 1000);

        fetch('/upload', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                clearInterval(timerInterval);
                alert(data.error);
                location.reload();
            } else {
                checkStatus(data.file_id);
            }
        })
        .catch(error => {
            clearInterval(timerInterval);
            alert('Error uploading file');
            location.reload();
        });
    }

    function checkStatus(file_id) {
        let pollErrors = 0;  // toleransi blip jaringan sesaat sebelum menyerah
        const stopPolling = (msg) => {
            clearInterval(checkInterval);
            clearInterval(timerInterval);
            alert(msg);
            location.reload();
        };
        checkInterval = setInterval(() => {
            fetch(`/status/${file_id}`)
            .then(response => response.json())
            .then(data => {
                pollErrors = 0;  // respons valid -> reset penghitung error
                if (data.status === 'processing') {
                    if (data.progress !== undefined) {
                        document.getElementById('progressBar').style.width = data.progress + '%';
                        document.getElementById('progressText').innerText = data.progress + '%';
                    }
                    if (data.message) {
                        document.getElementById('loadingSubtitle').innerText = data.message;
                    }
                } else if (data.status === 'completed') {
                    clearInterval(checkInterval);
                    clearInterval(timerInterval);
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressText').innerText = '100%';
                    document.getElementById('loadingSubtitle').innerText = 'Selesai. Membuka laporan...';
                    window.location.href = `/report/${file_id}`;
                } else if (data.status === 'error') {
                    stopPolling("Error processing file: " + (data.message || 'tidak diketahui'));
                } else if (data.status === 'not_found') {
                    // results_db terhapus (server restart) atau file_id basi
                    stopPolling("Sesi analisis tidak ditemukan (server mungkin restart). Silakan unggah ulang.");
                } else if (data.error) {
                    // mis. 403 Unauthorized: cookie/sesi tidak cocok
                    stopPolling("Akses ditolak: sesi tidak cocok. Silakan muat ulang halaman lalu coba lagi.");
                } else {
                    // bentuk respons tak dikenal -> jangan menggantung selamanya
                    stopPolling("Respons server tidak dikenali. Silakan coba lagi.");
                }
            })
            .catch(() => {
                // blip jaringan/JSON gagal: toleransi 5 kali (5 detik) sebelum menyerah
                pollErrors++;
                if (pollErrors >= 5) {
                    stopPolling("Koneksi ke server terputus. Silakan coba lagi.");
                }
            });
        }, 1000); // Polling lebih cepat menjadi 1 detik untuk realtime UI
    }
</script>

</body>
</html>
