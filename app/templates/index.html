<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Plagiasi No-Repository</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 900px;
        }
        .top-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
        }
        .upload-area {
            background-color: #f4f5f7;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background-color: #ebedf0;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
        }
        .btn-blue {
            background-color: #3b82f6;
        }
        .btn-red {
            background-color: #ef4444;
        }
        .upload-title {
            font-size: 20px;
            font-weight: 600;
            color: #555;
            margin: 15px 0 5px;
        }
        .upload-subtitle {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .upload-ext {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .filter-section {
            margin-bottom: 60px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }
        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #d1d5db;
        }
        
        .submit-container {
            display: flex;
            justify-content: center;
            margin-top: -20px;
        }
        .btn-submit {
            background-color: #fbcda7; /* Peach/Orange */
            color: white;
            border: none;
            padding: 12px 60px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }
        .btn-submit.active {
            background-color: #f97316;
        }
        .btn-submit:hover.active {
            background-color: #ea580c;
        }
        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #9ca3af;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-submit.active .badge {
            background-color: #4b5563;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="top-title">CEK PLAGIASI NO-REPOSITORY</div>
    
    <div class="card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="dropZone">
            <div class="upload-buttons">
                <button class="btn btn-blue" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Unggah File
                </button>
                <button class="btn btn-red" onclick="event.stopPropagation(); resetFile()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Hapus Semua
                </button>
            </div>
            
            <h2 class="upload-title" id="fileText">Cek Plagiasi No-Repository</h2>
            <p class="upload-subtitle" id="fileSub">TARIK FILE MU KESINI / KLIK AJA DISINI</p>
            <p class="upload-ext" id="fileExt">.docx .pdf aja ya</p>
            
            <input type="file" id="fileInput" accept=".pdf,.docx" onchange="fileSelected()">
        </div>
        
        <div class="filter-section">
            <div class="section-title">1. Pilih filter yang diinginkan</div>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="chkKutipan" checked> Kecualikan Kutipan
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="chkPustaka" checked> Kecualikan Daftar Pustaka
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="chkKecil"> Kecualikan sumber yang kurang dari 1%
                </label>
            </div>
        </div>
        
        <div class="submit-container">
            <button class="btn-submit" id="submitBtn" onclick="uploadFile()">
                SUBMIT
                <div class="badge" id="fileCount">0</div>
            </button>
        </div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
    <h3 style="color: #333; margin: 0;">Memproses Dokumen...</h3>
    <p style="color: #666; font-size: 14px;">Mesin sedang mencari kecocokan ke ratusan sumber web.</p>
</div>

<script>
    let selectedFile = null;

    function fileSelected() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            document.getElementById('fileText').innerText = selectedFile.name;
            document.getElementById('fileSub').innerText = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('fileExt').innerText = 'Siap untuk diproses';
            
            const btn = document.getElementById('submitBtn');
            btn.classList.add('active');
            document.getElementById('fileCount').innerText = '1';
        }
    }
    
    // Fitur Drag and Drop
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#e2e8f0';
        dropZone.style.border = '2px dashed #3b82f6';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#f4f5f7';
        dropZone.style.border = 'none';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#f4f5f7';
        dropZone.style.border = 'none';
        
        if (e.dataTransfer.files.length > 0) {
            document.getElementById('fileInput').files = e.dataTransfer.files;
            fileSelected();
        }
    });
    
    function resetFile() {
        selectedFile = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('fileText').innerText = 'Cek Plagiasi No-Repository';
        document.getElementById('fileSub').innerText = 'TARIK FILE MU KESINI / KLIK AJA DISINI';
        document.getElementById('fileExt').innerText = '.docx .pdf aja ya';
        
        const btn = document.getElementById('submitBtn');
        btn.classList.remove('active');
        document.getElementById('fileCount').innerText = '0';
    }

    function uploadFile() {
        if (!selectedFile) return;

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('exclude_quotes', document.getElementById('chkKutipan').checked);
        formData.append('exclude_biblio', document.getElementById('chkPustaka').checked);
        formData.append('exclude_small', document.getElementById('chkKecil').checked);

        document.getElementById('loadingOverlay').style.display = 'flex';

        fetch('/upload', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                location.reload();
            } else {
                checkStatus(data.file_id);
            }
        })
        .catch(error => {
            alert('Error uploading file');
            location.reload();
        });
    }

    function checkStatus(file_id) {
        const interval = setInterval(() => {
            fetch(`/status/${file_id}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'completed') {
                    clearInterval(interval);
                    window.location.href = `/report/${file_id}`;
                } else if (data.status === 'error') {
                    clearInterval(interval);
                    alert("Error processing file: " + data.message);
                    location.reload();
                }
            });
        }, 3000);
    }
</script>

</body>
</html>
